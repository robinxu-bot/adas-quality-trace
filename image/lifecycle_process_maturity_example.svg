<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="820" viewBox="0 0 1500 820">
  <rect width="1500" height="820" fill="#f5f7fb"/>
  <style>
    .title{font:700 34px Arial,sans-serif;fill:#0f172a}.sub{font:400 18px Arial,sans-serif;fill:#334155}
    .card{fill:#fff;stroke:#dbe3ee;stroke-width:2}.head{font:700 22px Arial,sans-serif;fill:#0f172a}
    .txt{font:400 18px Arial,sans-serif;fill:#334155}.small{font:400 16px Arial,sans-serif;fill:#475569}
    .line{stroke:#dbe3ee;stroke-width:2}.barbg{fill:#e2e8f0}.qm{fill:#22c55e}.fusa{fill:#f59e0b}.cs{fill:#facc15}.sotif{fill:#fb7185}.ai{fill:#ef4444}
    .call{fill:#1d4ed8}.callText{font:700 17px Arial,sans-serif;fill:#fff}.pill{fill:#fff1f2;stroke:#fda4af}.pillText{font:700 17px Arial,sans-serif;fill:#be123c}
  </style>
  <rect x="30" y="30" width="1440" height="750" rx="18" class="card"/>
  <text x="60" y="80" class="title">Lifecycle &amp; Process Maturity</text>
  <text x="60" y="114" class="sub">Framework -> Lifecycle phase -> Activity -> Gate · Activity x Gate is the minimum assessment unit</text>

  <g transform="translate(60,155)">
    <rect width="700" height="470" rx="14" class="card"/>
    <text x="24" y="44" class="head">Framework maturity</text>
    <line x1="24" y1="70" x2="676" y2="70" class="line"/>
    <g transform="translate(24,95)">
      <text x="0" y="22" class="txt">QM</text><rect x="150" y="0" width="410" height="26" rx="6" class="barbg"/><rect x="150" y="0" width="287" height="26" rx="6" class="qm"/><text x="580" y="22" class="txt">70%</text>
      <text x="0" y="72" class="txt">ISO 26262</text><rect x="150" y="50" width="410" height="26" rx="6" class="barbg"/><rect x="150" y="50" width="226" height="26" rx="6" class="fusa"/><text x="580" y="72" class="txt">55%</text>
      <text x="0" y="122" class="txt">ISO 21434</text><rect x="150" y="100" width="410" height="26" rx="6" class="barbg"/><rect x="150" y="100" width="246" height="26" rx="6" class="cs"/><text x="580" y="122" class="txt">60%</text>
      <text x="0" y="172" class="txt">SOTIF</text><rect x="150" y="150" width="410" height="26" rx="6" class="barbg"/><rect x="150" y="150" width="164" height="26" rx="6" class="sotif"/><text x="580" y="172" class="txt">40%</text>
      <text x="0" y="222" class="txt">ISO 8800</text><rect x="150" y="200" width="410" height="26" rx="6" class="barbg"/><rect x="150" y="200" width="144" height="26" rx="6" class="ai"/><text x="580" y="222" class="txt">35%</text>
    </g>
    <circle cx="648" cy="42" r="16" class="call"/><text x="643" y="48" class="callText">1</text>
    <text x="24" y="380" class="small">Low framework score must drill down to lifecycle phase, activity, gate, evidence and risk.</text>
    <text x="24" y="420" class="small">SOTIF and ISO 8800 are shown separately, even when they are trace-linked.</text>
  </g>

  <g transform="translate(800,155)">
    <rect width="640" height="470" rx="14" class="card"/>
    <text x="24" y="44" class="head">Activity x Gate examples</text>
    <line x1="24" y1="70" x2="616" y2="70" class="line"/>
    <text x="24" y="110" class="txt">ISO 8800 / Data lifecycle / QG2</text>
    <rect x="24" y="126" width="110" height="30" rx="15" class="pill"/><text x="44" y="147" class="pillText">Fail</text>
    <text x="160" y="148" class="small">Dataset representativeness evidence incomplete</text>
    <line x1="24" y1="178" x2="616" y2="178" class="line"/>
    <text x="24" y="220" class="txt">SOTIF / Scenario analysis / QG2</text>
    <rect x="24" y="236" width="160" height="30" rx="15" fill="#fff7ed" stroke="#fdba74"/><text x="45" y="257" class="pillText">Conditional</text>
    <text x="205" y="258" class="small">Night/rain trigger scenarios not fully covered</text>
    <line x1="24" y1="288" x2="616" y2="288" class="line"/>
    <text x="24" y="330" class="txt">ISO 26262 / Safety analysis / QG2</text>
    <rect x="24" y="346" width="130" height="30" rx="15" fill="#fef3c7" stroke="#facc15"/><text x="46" y="367" class="pillText">In progress</text>
    <text x="175" y="368" class="small">Analysis exists but rationale is incomplete</text>
    <circle cx="588" cy="42" r="16" class="call"/><text x="583" y="48" class="callText">2</text>
  </g>

  <text x="60" y="700" class="txt">Reading rule: use framework bars to find weak standards, then inspect Activity x Gate rows to understand exact missing evidence, failed judgement, or risk linkage.</text>
</svg>
