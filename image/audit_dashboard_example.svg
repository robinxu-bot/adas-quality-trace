<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <rect width="1600" height="900" fill="#f5f7fb"/>
  <style>
    .title{font:700 34px Arial, sans-serif;fill:#0f172a}
    .sub{font:400 18px Arial, sans-serif;fill:#334155}
    .card{fill:#fff;stroke:#dbe3ee;stroke-width:2}
    .label{font:700 20px Arial, sans-serif;fill:#0f172a}
    .value{font:700 42px Arial, sans-serif;fill:#0f172a}
    .hint{font:400 18px Arial, sans-serif;fill:#334155}
    .pillCritical{fill:#fff1f2;stroke:#fda4af}
    .pillHigh{fill:#fff7ed;stroke:#fdba74}
    .pillLow{fill:#ecfdf5;stroke:#86efac}
    .pillUnknown{fill:#fff1f2;stroke:#fda4af}
    .pillBlocked{fill:#fff1f2;stroke:#fda4af}
    .pillText{font:700 18px Arial, sans-serif;fill:#be123c}
    .greenText{font:700 18px Arial, sans-serif;fill:#047857}
    .callout{fill:#1d4ed8}
    .calloutText{font:700 18px Arial, sans-serif;fill:#fff}
    .section{font:700 26px Arial, sans-serif;fill:#0f172a}
    .line{stroke:#dbe3ee;stroke-width:2}
  </style>

  <rect x="28" y="28" width="1544" height="820" rx="18" class="card"/>
  <text x="56" y="78" class="title">Audit Report Dashboard</text>
  <text x="56" y="112" class="sub">Snapshot 2026-06-03 03:01 JST · Current gate QG2</text>

  <g transform="translate(56,150)">
    <rect width="348" height="110" rx="16" class="card"/>
    <circle cx="318" cy="22" r="17" class="callout"/><text x="312" y="28" class="calloutText">1</text>
    <rect x="20" y="22" width="84" height="32" rx="16" class="pillCritical"/>
    <text x="31" y="44" class="pillText">Critical</text>
    <text x="20" y="82" class="label">Recommended Attention</text>
  </g>

  <g transform="translate(424,150)">
    <rect width="348" height="110" rx="16" class="card"/>
    <circle cx="318" cy="22" r="17" class="callout"/><text x="312" y="28" class="calloutText">2</text>
    <rect x="20" y="22" width="58" height="32" rx="16" class="pillHigh"/>
    <text x="33" y="44" class="pillText">High</text>
    <text x="20" y="82" class="label">Product Risk</text>
  </g>

  <g transform="translate(792,150)">
    <rect width="348" height="110" rx="16" class="card"/>
    <circle cx="318" cy="22" r="17" class="callout"/><text x="312" y="28" class="calloutText">3</text>
    <rect x="20" y="22" width="96" height="32" rx="16" class="pillUnknown"/>
    <text x="31" y="44" class="pillText">Unknown</text>
    <text x="20" y="82" class="label">Process Maturity Risk</text>
  </g>

  <g transform="translate(1160,150)">
    <rect width="348" height="110" rx="16" class="card"/>
    <circle cx="318" cy="22" r="17" class="callout"/><text x="312" y="28" class="calloutText">4</text>
    <rect x="20" y="22" width="92" height="32" rx="16" class="pillBlocked"/>
    <text x="31" y="44" class="pillText">Blocked</text>
    <text x="20" y="82" class="label">Gate Progression Signal</text>
  </g>

  <g transform="translate(56,285)">
    <rect width="348" height="130" rx="16" class="card"/>
    <circle cx="318" cy="24" r="17" class="callout"/><text x="312" y="30" class="calloutText">5</text>
    <rect x="20" y="22" width="58" height="32" rx="16" class="pillLow"/>
    <text x="34" y="44" class="greenText">Low</text>
    <text x="20" y="78" class="label">Risk Confidence</text>
    <text x="20" y="106" class="hint">Evidence coverage below threshold</text>
  </g>

  <g transform="translate(424,285)">
    <rect width="348" height="130" rx="16" class="card"/>
    <circle cx="318" cy="24" r="17" class="callout"/><text x="312" y="30" class="calloutText">6</text>
    <text x="20" y="62" class="value">55%</text>
    <text x="20" y="100" class="label">Integrated Score</text>
  </g>

  <g transform="translate(792,285)">
    <rect width="348" height="130" rx="16" class="card"/>
    <circle cx="318" cy="24" r="17" class="callout"/><text x="312" y="30" class="calloutText">7</text>
    <text x="20" y="62" class="value">3</text>
    <text x="20" y="100" class="label">Open Risks</text>
  </g>

  <g transform="translate(1160,285)">
    <rect width="348" height="130" rx="16" class="card"/>
    <circle cx="318" cy="24" r="17" class="callout"/><text x="312" y="30" class="calloutText">8</text>
    <text x="20" y="62" class="value">3</text>
    <text x="20" y="100" class="label">Evidence Gaps</text>
  </g>

  <g transform="translate(56,450)">
    <rect width="720" height="230" rx="16" class="card"/>
    <text x="24" y="44" class="section">Gate Readiness</text>
    <line x1="24" y1="78" x2="696" y2="78" class="line"/>
    <text x="24" y="112" class="hint">Integrated maturity</text><text x="460" y="112" class="hint">55%</text>
    <line x1="24" y1="130" x2="696" y2="130" class="line"/>
    <text x="24" y="164" class="hint">P0 status</text><text x="460" y="164" class="hint">Unknown</text>
    <line x1="24" y1="182" x2="696" y2="182" class="line"/>
    <text x="24" y="216" class="hint">Blocking gaps</text><text x="460" y="216" class="hint">3</text>
  </g>

  <g transform="translate(808,450)">
    <rect width="700" height="230" rx="16" class="card"/>
    <text x="24" y="44" class="section">Risk Confidence</text>
    <line x1="24" y1="78" x2="676" y2="78" class="line"/>
    <text x="24" y="112" class="hint">Evidence coverage</text><text x="500" y="112" class="hint">0%</text>
    <line x1="24" y1="130" x2="676" y2="130" class="line"/>
    <text x="24" y="164" class="hint">Trace coverage</text><text x="500" y="164" class="hint">100%</text>
    <line x1="24" y1="182" x2="676" y2="182" class="line"/>
    <text x="24" y="216" class="hint">Assessment coverage</text><text x="500" y="216" class="hint">0%</text>
  </g>

  <g transform="translate(56,720)">
    <rect width="1484" height="78" rx="16" fill="#eef6ff" stroke="#bfdbfe" stroke-width="2"/>
    <text x="24" y="32" class="label">Reading rule</text>
    <text x="24" y="58" class="hint">A low score or a high risk card must always be explainable by evidence, assessment coverage, open risk, gate blocker, or lifecycle activity status.</text>
  </g>
</svg>
