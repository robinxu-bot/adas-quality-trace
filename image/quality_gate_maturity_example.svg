<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="760" viewBox="0 0 1500 760">
  <rect width="1500" height="760" fill="#f5f7fb"/>
  <style>
    .title{font:700 34px Arial,sans-serif;fill:#0f172a}
    .sub{font:400 18px Arial,sans-serif;fill:#334155}
    .card{fill:#fff;stroke:#dbe3ee;stroke-width:2}
    .head{font:700 20px Arial,sans-serif;fill:#0f172a}
    .txt{font:400 18px Arial,sans-serif;fill:#334155}
    .num{font:700 22px Arial,sans-serif;fill:#0f172a}
    .good{fill:#dcfce7}.mid{fill:#fef3c7}.bad{fill:#fee2e2}.unk{fill:#f1f5f9}
    .line{stroke:#dbe3ee;stroke-width:2}
    .call{fill:#1d4ed8}.callText{font:700 17px Arial,sans-serif;fill:#fff}
  </style>
  <rect x="30" y="30" width="1440" height="690" rx="18" class="card"/>
  <text x="60" y="80" class="title">Quality Gate Maturity</text>
  <text x="60" y="114" class="sub">Gate x Quality Aspect maturity view · Current gate QG2 highlighted</text>

  <g transform="translate(60,155)">
    <rect width="1380" height="300" rx="14" class="card"/>
    <text x="24" y="42" class="head">Gate maturity matrix</text>
    <line x1="24" y1="66" x2="1356" y2="66" class="line"/>
    <text x="34" y="105" class="head">Gate</text>
    <text x="210" y="105" class="head">QM</text>
    <text x="410" y="105" class="head">FuSA</text>
    <text x="610" y="105" class="head">CS</text>
    <text x="810" y="105" class="head">SOTIF</text>
    <text x="1010" y="105" class="head">AI Safety</text>
    <text x="1210" y="105" class="head">Signal</text>

    <g transform="translate(24,130)">
      <rect width="1328" height="42" fill="#fff"/>
      <text x="10" y="28" class="txt">QG0</text>
      <rect x="170" y="4" width="92" height="32" rx="8" class="good"/><text x="188" y="27" class="num">80%</text>
      <rect x="370" y="4" width="92" height="32" rx="8" class="good"/><text x="388" y="27" class="num">70%</text>
      <rect x="570" y="4" width="92" height="32" rx="8" class="mid"/><text x="588" y="27" class="num">60%</text>
      <rect x="770" y="4" width="92" height="32" rx="8" class="mid"/><text x="788" y="27" class="num">50%</text>
      <rect x="970" y="4" width="92" height="32" rx="8" class="bad"/><text x="988" y="27" class="num">40%</text>
      <text x="1170" y="28" class="txt">Conditional</text>
    </g>
    <g transform="translate(24,178)">
      <rect width="1328" height="46" fill="#eef6ff" stroke="#bfdbfe"/>
      <circle cx="1260" cy="22" r="16" class="call"/><text x="1255" y="28" class="callText">1</text>
      <text x="10" y="30" class="txt">QG2</text>
      <rect x="170" y="7" width="92" height="32" rx="8" class="good"/><text x="188" y="30" class="num">70%</text>
      <rect x="370" y="7" width="92" height="32" rx="8" class="mid"/><text x="388" y="30" class="num">55%</text>
      <rect x="570" y="7" width="92" height="32" rx="8" class="mid"/><text x="588" y="30" class="num">50%</text>
      <rect x="770" y="7" width="92" height="32" rx="8" class="bad"/><text x="788" y="30" class="num">40%</text>
      <rect x="970" y="7" width="92" height="32" rx="8" class="bad"/><text x="988" y="30" class="num">30%</text>
      <text x="1170" y="30" class="txt">Blocked</text>
    </g>
    <g transform="translate(24,232)">
      <rect width="1328" height="42" fill="#fff"/>
      <text x="10" y="28" class="txt">QG3</text>
      <rect x="170" y="4" width="92" height="32" rx="8" class="unk"/><text x="190" y="27" class="num">N/A</text>
      <rect x="370" y="4" width="92" height="32" rx="8" class="unk"/><text x="390" y="27" class="num">N/A</text>
      <rect x="570" y="4" width="92" height="32" rx="8" class="unk"/><text x="590" y="27" class="num">N/A</text>
      <rect x="770" y="4" width="92" height="32" rx="8" class="unk"/><text x="790" y="27" class="num">N/A</text>
      <rect x="970" y="4" width="92" height="32" rx="8" class="unk"/><text x="990" y="27" class="num">N/A</text>
      <text x="1170" y="28" class="txt">Future</text>
    </g>
  </g>

  <g transform="translate(60,485)">
    <rect width="660" height="150" rx="14" class="card"/>
    <circle cx="618" cy="30" r="16" class="call"/><text x="613" y="36" class="callText">2</text>
    <text x="24" y="42" class="head">Current gate blocker</text>
    <text x="24" y="78" class="txt">QG2 is pulled down by SOTIF and AI Safety maturity.</text>
    <text x="24" y="112" class="txt">FuSA is below ready threshold and needs drill-down.</text>
  </g>
  <g transform="translate(760,485)">
    <rect width="680" height="150" rx="14" class="card"/>
    <circle cx="638" cy="30" r="16" class="call"/><text x="633" y="36" class="callText">3</text>
    <text x="24" y="42" class="head">How to read</text>
    <text x="24" y="78" class="txt">Read by gate first, then by quality aspect.</text>
    <text x="24" y="112" class="txt">Low cells must link to activities, evidence gaps, and risks.</text>
  </g>
</svg>
